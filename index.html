<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI/CD Demo - Nginx</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #1a1a2e;
            color: #e0e0e0;
        }
        .card {
            background: #16213e;
            padding: 2rem 3rem;
            border-radius: 12px;
            border: 1px solid #0f3460;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        h1 { color: #e94560; margin-bottom: 0.5rem; }
        p { color: #a0a0b0; }
        .badge {
            display: inline-block;
            margin-top: 1rem;
            background: #0f3460;
            color: #53d8fb;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 CI/CD Demo</h1>
        <p>Pipeline GitHub Actions opérationnel</p>
        <span class="badge">Deployed via CI/CD</span>
    </div>
</body>
</html>
